# CaseLoad Select — Continuous Integration
#
# Validates every pull request and every push to main against:
#   1. TypeScript type correctness (npx tsc --noEmit)
#   2. Full vitest suite (1894+ tests)
#   3. DR-039 brief-equality eval (explicit regression guard for
#      language-agnostic intake parity across en/fr/es/pt/zh)
#   4. Publication receipt/claim concurrency integration tests, against a
#      genuinely ephemeral local Supabase Postgres instance (see the
#      integration-test job below) -- real two-connection Postgres
#      row-locking races that `test` (job 2, mocked Supabase clients) does
#      not and cannot exercise.
#
# Engine sandbox-vs-app drift (DR-033/DR-058) is gated here via a committed
# fingerprint. The full check (scripts/check-engine-sync.sh) needs the sandbox,
# which lives on disk and is not in version control, so it stays operator-local.
# CI instead runs scripts/check-engine-manifest.sh, which diffs the engine port
# against scripts/engine-sync.manifest, the fingerprint that check-engine-sync.sh
# refreshes locally once app == sandbox is verified. A failure here means an
# engine file changed without that ritual.
#
# Required status checks (set in GitHub branch protection):
#   - typecheck
#   - test
#   - brief-equality-eval
#   - engine-sync
#
# integration-test (below) is a NEW job, intentionally not in the list above.
# It is written to be added as a 5th required check, but branch protection is
# GitHub repo configuration this workflow file cannot change -- a human with
# repo admin access must add "Publication concurrency integration tests" to
# the required-checks list once this job is confirmed green on main.
#
# KNOWN BLOCKER for integration-test (corrective-release workstream 6, filed
# 2026-07-16; corrected 2026-07-17 after a Codex independent release review
# found the original wording overclaimed the scope): `supabase start`
# applies every file in supabase/migrations/ in order to a FRESH, empty
# Postgres. That directory only contains incremental changes starting
# 2026-04-13, and TWO SEPARATE problems block a from-scratch run --
# conflating them (as an earlier version of this comment did) makes the fix
# sound bigger and less tractable than it is:
#
#   1. A SMALL set of foundational tables (intake_firms, law_firm_clients,
#      leads, diagnostics, sequence_templates, sequence_steps,
#      email_sequences, review_requests, state_history -- 9 tables,
#      case-insensitive-scanned 2026-07-17) have NO CREATE TABLE statement
#      anywhere in supabase/migrations/ at all. This is the actual
#      from-scratch blocker: the very first substantive migration
#      (20260414_portal_clio.sql, `ALTER TABLE intake_firms ADD COLUMN ...`)
#      fails immediately on a from-scratch database, and since intake_firms
#      is a base dependency, `supabase start` cannot get through the rest of
#      the migration chain either (confirmed via the Supabase CLI locally --
#      `supabase status -o env` parses and runs correctly against CLI
#      2.109.1 -- and independently via the Supabase MCP: `list_tables` on
#      project ssxryjxifwiivghglqer shows these tables live with no
#      corresponding CREATE TABLE anywhere in this directory).
#   2. A LARGER set of tables (firm_lawyers, conflict_register,
#      conflict_checks, industry_benchmarks, matter_routing,
#      retainer_agreements, screened_leads, sub_type_conflicts,
#      unconfirmed_inquiries, webhook_outbox, firm_decline_templates,
#      firm_onboarding_intake, channel_intake_sessions -- 13 tables) DO have
#      a real CREATE TABLE file already committed in supabase/migrations/;
#      that file is just missing from Supabase's own tracked production
#      ledger (`list_migrations` on ssxryjxifwiivghglqer starts at
#      20260518193933, after all 13 of these files' dates). This is a
#      provenance/drift-auditing gap, not a from-scratch-executability
#      blocker -- these 13 tables' own migration files are correct and would
#      apply fine to a fresh Postgres once problem 1 is fixed.
#
# This job is wired correctly and will fail LOUDLY on the missing-baseline
# error (not silently skip) until a human authors a baseline/bootstrap
# migration covering the 9 problem-1 tables. Do NOT do this by dumping
# production's CURRENT schema and prepending it before replaying all
# existing migrations -- a current-state dump already contains the
# cumulative effect of everything that ran after 2026-04-13, so replaying
# those same migrations on top of it would fail on duplicate-object errors
# or silently diverge from what actually ran in production. The two safe
# strategies (reconstruct the pre-2026-04-13 baseline and replay history
# unmodified, OR a new current-state squash baseline with the existing
# migrations explicitly excluded from fresh-install replay) are documented
# in the `supabase-baseline-migration-gap` memory record. That
# reconstruction is a separate, larger undertaking outside this workstream's
# scope (repair 2 test files + wire CI to run them) and is not attempted
# here -- see the flagged follow-up task.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tsc --noEmit
        run: npx tsc --noEmit

  test:
    name: Full vitest suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npx vitest run

  brief-equality-eval:
    name: DR-039 brief-equality eval (language parity)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run brief-equality eval
        # Explicit run as a separate job surfaces this regression guard
        # as its own status check. Branch protection should require this
        # check to pass before merge once the eval file is on main.
        # DR-039 codifies language-agnostic intake; a failure here means
        # brief structure diverged across languages and the doctrine is
        # broken.
        #
        # The if-exists guard handles the bootstrap case: this CI workflow
        # lands in its own PR before the DR-039 PR that ships the eval
        # file. On branches that pre-date the eval (the CI bootstrap PR
        # itself, plus any branch cut from main before DR-039 merged),
        # the job logs a notice and passes. Once the eval lands in main,
        # every branch with the file in scope runs the assertion.
        run: |
          if [ -f src/lib/__evals__/brief-equality-eval.test.ts ]; then
            npx vitest run src/lib/__evals__/brief-equality-eval.test.ts
          else
            echo "brief-equality-eval.test.ts is not present on this branch yet — skipping. The eval ships with DR-039 (PR #7). Once that lands in main, this job will run the assertion on every PR."
          fi

  engine-sync:
    name: Engine sync (DR-058)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify engine port matches the committed manifest
        # CI can't see the sandbox (not in git), so this diffs the engine port
        # against scripts/engine-sync.manifest, the fingerprint that
        # check-engine-sync.sh refreshes locally once app == sandbox is verified.
        # A failure means an engine file changed without the sync ritual: run
        # `npm run check:engine-sync` locally and commit the refreshed manifest.
        # Only bash + sha256sum are needed, so this job skips the Node setup.
        #
        # The bootstrap window (an if-exists skip for branches predating
        # DR-058) is over: both scripts/check-engine-manifest.sh and
        # scripts/engine-sync.manifest have been on main since 2026-06-09
        # (Ses.13 launch hardening). A missing file now is a real repo defect,
        # not an expected pre-DR-058 branch, so it fails loud instead of
        # silently passing this required check (Codex audit 2026-07-06,
        # finding 9).
        run: |
          if [ ! -f scripts/check-engine-manifest.sh ] || [ ! -f scripts/engine-sync.manifest ]; then
            echo "::error::engine-sync manifest or check script is missing from this branch. Run scripts/check-engine-sync.sh locally and commit the refreshed scripts/engine-sync.manifest before merging."
            exit 1
          fi
          bash scripts/check-engine-manifest.sh

  integration-test:
    name: Publication concurrency integration tests (real Postgres)
    runs-on: ubuntu-latest
    # A dedicated job, not a step tacked onto `test`: standing up the local
    # Supabase/Docker stack adds real wall-clock time and a real (currently
    # known-broken -- see the KNOWN BLOCKER note at the top of this file)
    # infrastructure failure mode, and isolating it here means that failure
    # blocks only this specific, clearly-named check instead of the fast
    # unit-test job everything else depends on.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        # Pinned to the version this workflow was authored and verified
        # against (`npx supabase@latest --version` => 2.109.1, 2026-07-16).
        # CLI flags for `supabase status -o env` / `--override-name` have
        # changed across versions before; bump this deliberately, not
        # silently via a floating tag, and re-verify the flags below still
        # parse (`supabase status --help`) when you do.
        uses: supabase/setup-cli@v3
        with:
          version: '2.109.1'

      - name: Start local Supabase stack (applies supabase/migrations/*.sql to a fresh Postgres)
        # `supabase start` spins up the full local stack via Docker (real
        # Postgres 17 plus the auth/storage/extensions schemas and the
        # anon/authenticated/service_role roles this project's migrations
        # and RLS policies assume -- a bare `postgres:` service container
        # would have none of that) and applies every file in
        # supabase/migrations/ in order. It blocks until every service
        # reports healthy and exits non-zero if any migration fails or a
        # service never becomes healthy -- i.e. this step itself is the
        # "wait for ready" gate; no separate polling step is needed. See the
        # KNOWN BLOCKER note at the top of this file for why this step is
        # currently expected to fail until a baseline migration is added --
        # that is a real, intentional, loud CI failure, not a bug in this
        # step.
        run: supabase start

      - name: Export DIRECT_DATABASE_URL from the running stack
        # `supabase status -o env` prints dotenv-style KEY=value lines;
        # `--override-name db.url=DIRECT_DATABASE_URL` renames just the
        # local Postgres direct-connection URL entry (default name DB_URL)
        # to the variable name these test files read, without also leaking
        # the local anon/service_role JWTs into the job environment.
        # Appending to $GITHUB_ENV makes it available to every subsequent
        # step in this job, not just this one's shell.
        run: |
          supabase status -o env --override-name db.url=DIRECT_DATABASE_URL >> "$GITHUB_ENV"

      - name: Verify DIRECT_DATABASE_URL was exported
        # Both integration test files gate on `describe.skipIf(!DIRECT_DATABASE_URL)`
        # -- correct for local dev, but it means a silent provisioning
        # hiccup here (e.g. an --override-name key that stopped matching
        # after a CLI upgrade) would make the next step pass green having
        # run zero assertions, exactly the failure mode this job exists to
        # close. Fail loudly here instead, before vitest ever runs.
        run: |
          if [ -z "${DIRECT_DATABASE_URL:-}" ]; then
            echo "::error::DIRECT_DATABASE_URL was not exported by 'supabase status -o env'. The integration tests would silently skip instead of running -- failing this job explicitly rather than passing green with 0 assertions."
            exit 1
          fi
          echo "DIRECT_DATABASE_URL is set; integration tests will run for real."

      - name: Run publication concurrency integration tests
        run: npx vitest run src/lib/__tests__/publication-receipt-concurrency.integration.test.ts src/lib/__tests__/publication-placement-claim-concurrency.integration.test.ts

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop
