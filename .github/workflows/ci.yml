# CaseLoad Select — Continuous Integration
#
# Validates every pull request and every push to main against:
#   1. TypeScript type correctness (npx tsc --noEmit)
#   2. Full vitest suite (1894+ tests)
#   3. DR-039 brief-equality eval (explicit regression guard for
#      language-agnostic intake parity across en/fr/es/pt/zh)
#
# Engine sandbox-vs-app drift (DR-033/DR-058) is gated here via a committed
# fingerprint. The full check (scripts/check-engine-sync.sh) needs the sandbox,
# which lives on disk and is not in version control, so it stays operator-local.
# CI instead runs scripts/check-engine-manifest.sh, which diffs the engine port
# against scripts/engine-sync.manifest, the fingerprint that check-engine-sync.sh
# refreshes locally once app == sandbox is verified. A failure here means an
# engine file changed without that ritual.
#
# Required status checks (set in GitHub branch protection):
#   - typecheck
#   - test
#   - brief-equality-eval
#   - engine-sync

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tsc --noEmit
        run: npx tsc --noEmit

  test:
    name: Full vitest suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npx vitest run

  brief-equality-eval:
    name: DR-039 brief-equality eval (language parity)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run brief-equality eval
        # Explicit run as a separate job surfaces this regression guard
        # as its own status check. Branch protection should require this
        # check to pass before merge once the eval file is on main.
        # DR-039 codifies language-agnostic intake; a failure here means
        # brief structure diverged across languages and the doctrine is
        # broken.
        #
        # The if-exists guard handles the bootstrap case: this CI workflow
        # lands in its own PR before the DR-039 PR that ships the eval
        # file. On branches that pre-date the eval (the CI bootstrap PR
        # itself, plus any branch cut from main before DR-039 merged),
        # the job logs a notice and passes. Once the eval lands in main,
        # every branch with the file in scope runs the assertion.
        run: |
          if [ -f src/lib/__evals__/brief-equality-eval.test.ts ]; then
            npx vitest run src/lib/__evals__/brief-equality-eval.test.ts
          else
            echo "brief-equality-eval.test.ts is not present on this branch yet — skipping. The eval ships with DR-039 (PR #7). Once that lands in main, this job will run the assertion on every PR."
          fi

  engine-sync:
    name: Engine sync (DR-058)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify engine port matches the committed manifest
        # CI can't see the sandbox (not in git), so this diffs the engine port
        # against scripts/engine-sync.manifest, the fingerprint that
        # check-engine-sync.sh refreshes locally once app == sandbox is verified.
        # A failure means an engine file changed without the sync ritual: run
        # `npm run check:engine-sync` locally and commit the refreshed manifest.
        # Only bash + sha256sum are needed, so this job skips the Node setup.
        #
        # if-exists guard for the bootstrap window: older in-flight branches
        # won't carry the script/manifest yet (mirrors the brief-equality job).
        run: |
          if [ -f scripts/check-engine-manifest.sh ] && [ -f scripts/engine-sync.manifest ]; then
            bash scripts/check-engine-manifest.sh
          else
            echo "engine-sync gate not present on this branch yet, skipping (ships with DR-058)."
          fi
